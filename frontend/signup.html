<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Make Your Trip</title>
  <link rel="stylesheet" href="signup.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="signup-page">
  <div class="signup-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="pin-layer" id="signup-pin-layer" aria-hidden="true"></div>
  </div>

  <main class="signup-container">
    <div class="signup-card" id="signup-card">
      <div class="card-header">
        <h1>Create Account</h1>
        <p>Start planning smarter trips in minutes.</p>
      </div>

      <form id="signup-form">
        <label>
          User Name
          <div class="input-wrap">
            <input type="text" id="signup-name" placeholder="User Name" required />
            <span class="input-glow"></span>
          </div>
        </label>
        <label>
          Email
          <div class="input-wrap">
            <input type="email" id="signup-email" placeholder="you@email.com" required />
            <span class="input-glow"></span>
          </div>
        </label>
        <label>
          Password
          <div class="input-wrap">
            <input type="password" id="signup-password" placeholder="Minimum 8 characters" required />
            <span class="input-glow"></span>
            <button class="toggle-password" type="button" aria-label="Show password"></button>
          </div>
        </label>
        <label>
          Confirm Password
          <div class="input-wrap">
            <input type="password" id="signup-confirm" placeholder="Re-enter password" required />
            <span class="input-glow"></span>
            <button class="toggle-password" type="button" aria-label="Show password"></button>
          </div>
        </label>
        <label class="robot-check">
          <input type="checkbox" id="signup-robot" />
          I am not a robot
        </label>
        <button class="signup-btn" type="submit">Create Account</button>
        <div class="signup-status" id="signup-status"></div>
      </form>
      <div class="card-footer">
        <a href="signin.html">Already have an account? Sign in</a>
        <a href="index.html">Back to home</a>
      </div>
    </div>
  </main>

  <script src="signup.js"></script>
</body>
</html>
