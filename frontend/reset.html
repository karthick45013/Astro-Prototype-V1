<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Make Your Trip</title>
  <link rel="stylesheet" href="reset.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="reset-page">
  <div class="reset-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="reset-container">
    <div class="reset-card">
      <div class="card-header">
        <h1>Set New Password</h1>
        <p>Create a strong password to secure your account.</p>
      </div>

      <form id="reset-form">
        <label>
          New Password
          <div class="input-wrap">
            <input type="password" id="reset-password" placeholder="Minimum 8 characters" required />
            <span class="input-glow"></span>
            <button class="toggle-password" type="button" aria-label="Show password"></button>
          </div>
        </label>
        <label>
          Confirm Password
          <div class="input-wrap">
            <input type="password" id="reset-confirm" placeholder="Re-enter password" required />
            <span class="input-glow"></span>
            <button class="toggle-password" type="button" aria-label="Show password"></button>
          </div>
        </label>
        <button class="primary-btn" type="submit">Update Password</button>
        <div class="reset-status" id="reset-status"></div>
      </form>

      <div class="card-footer">
        <a href="signin.html">Back to sign in</a>
      </div>
    </div>
  </main>

  <script src="reset.js"></script>
</body>
</html>
