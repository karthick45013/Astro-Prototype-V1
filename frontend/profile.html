<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Make Your Trip</title>
  <link rel="stylesheet" href="profile.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="profile-page">
  <main class="profile-page-shell">
    <header class="profile-top">
      <a href="user.html" class="ghost-link">Back</a>
    </header>

    <section class="profile-card">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profile-avatar">U</div>
        <button class="avatar-edit-btn" id="avatar-edit-btn" type="button" aria-label="Edit profile photo">&#9998;</button>
      </div>
      <div class="profile-copy">
        <h1 id="profile-name">WELCOME USER</h1>
      </div>
    </section>

    <section class="history-card">
      <h2>Recent Planned Trips</h2>
      <p>Last 5 trips you planned.</p>
      <div id="profile-trip-history"></div>
    </section>
  </main>

  <div class="crop-modal hidden" id="crop-modal" aria-hidden="true">
    <div class="crop-card">
      <h3>Adjust Profile Photo</h3>
      <p>Drag to position and use zoom to fit your image into the circle.</p>
      <div class="crop-stage">
        <canvas id="crop-canvas" width="320" height="320"></canvas>
        <div class="crop-mask" aria-hidden="true"></div>
      </div>
      <label class="crop-zoom-wrap">
        Zoom
        <input id="crop-zoom" type="range" min="100" max="400" value="100" />
      </label>
      <div class="crop-actions">
        <button class="ghost-btn" id="crop-cancel" type="button">Cancel</button>
        <button class="apply-btn" id="crop-apply" type="button">Apply</button>
      </div>
    </div>
  </div>

  <input id="avatar-upload" type="file" accept="image/*" class="hidden" />
  <script src="profile.js"></script>
</body>
</html>
