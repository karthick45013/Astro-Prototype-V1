<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Make Your Trip</title>
  <link rel="stylesheet" href="forgot.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="forgot-page">
  <div class="forgot-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="forgot-container">
    <div class="forgot-card">
      <div class="card-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive a verification code.</p>
      </div>

      <form id="forgot-form">
        <label>
          Email
          <div class="input-wrap">
            <input type="email" id="forgot-email" placeholder="you@email.com" required />
            <span class="input-glow"></span>
          </div>
        </label>
        <label class="verify-field hidden">
          Verification Code
          <div class="input-wrap">
            <input type="text" id="forgot-code" placeholder="Enter code" required />
            <span class="input-glow"></span>
          </div>
          <div class="timer hidden" id="code-timer">02:00</div>
        </label>

        <button class="action-btn" type="button" id="send-code-btn">Send Verification Code</button>
        <button class="primary-btn" type="submit" id="submit-btn">Reset Password</button>
        <div class="forgot-status" id="forgot-status"></div>
        <a class="reset-link hidden" id="reset-link" href="reset.html">Open reset link</a>
      </form>

      <div class="card-footer">
        <a href="signin.html">Back to sign in</a>
      </div>
    </div>
  </main>

  <script src="forgot.js"></script>
</body>
</html>
